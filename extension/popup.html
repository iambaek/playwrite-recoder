<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Playwrite Recoder</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <section class="toolbar">
        <div class="toolbar-buttons">
          <button id="recordOnBtn" class="toggle-button">Rec On</button>
          <button id="recordOffBtn" class="toggle-button">Rec Off</button>
          <button id="replayBtn">Replay</button>
          <button id="downloadCodeBtn">Download</button>
        </div>
        <div class="toolbar-options">
          <label class="option-row">
            <input id="useDelayCheckbox" type="checkbox" checked>
            <span>Delay</span>
          </label>
          <label class="option-row">
            <input id="skipOnErrorCheckbox" type="checkbox" checked>
            <span>Skip Error</span>
          </label>
          <p id="status" class="status">Idle</p>
        </div>
      </section>

      <section class="panel code-panel">
        <div class="code-header">
          <h2>Playwright Code</h2>
          <div>
            <button id="formatCodeBtn" class="small-btn">Format</button>
            <button id="copyCodeBtn" class="small-btn">Copy</button>
          </div>
        </div>
        <pre id="codeOutput" class="output" contenteditable="true" spellcheck="false"></pre>
      </section>

      <section class="panel chat-panel">
        <h2>AI Agent</h2>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="prompt-bar">
          <textarea id="aiPromptInput" class="prompt-input" placeholder="AI에게 코드 수정을 요청하세요..." rows="2"></textarea>
          <button id="aiPromptBtn" class="prompt-send-btn">Send</button>
        </div>
      </section>
    </main>

    <script src="playwright-generator.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
